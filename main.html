<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Adoption Application</title>
</head>
<body>

    <h1>Dog Adoption Application</h1>

    <form>
        <!-- Name -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" placeholder="Name"><br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label><br>
        <input type="text" id="phone" placeholder="Phone Number"><br><br>

        <!-- Address -->
        <label for="address">Address:</label><br>
        <input type="text" id="address" placeholder="Address"><br><br>

        <!-- Checkbox -->
        <label>
            <input type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?">
            Have you ever lived with a Dog before?
        </label><br><br>

        <!-- Multi-select -->
        <label for="breeds">Please select your preferred breeds:</label><br>
        <select id="breeds" multiple>
            <option value="labrador">Labrador</option>
            <option value="german_shepherd">German Shepherd</option>
            <option value="bulldog">Bulldog</option>
        </select><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">

    </form>

</body>
</html>
